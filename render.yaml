services:
  - type: web
    name: colabilidades
    runtime: docker
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /var/data/colabilidades.db
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: colabilidades-data
      mountPath: /var/data
      sizeGB: 1
